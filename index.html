    <center>
    <h2>Enter the roll number to view the image</h2><br>
    <input type="text" id="numberInput" placeholder="2411it0100(1-80)" />
    <button id="inputButton" onclick="showImage()">Submit</button>
    <br><br>
    <img id="myImage" src="1.png" alt="Your Image">
    <script>
        function showImage() {
            const roll_number = document.getElementById('numberInput').value;
            const images = document.getElementById('myImage');
            if (roll_number.length !== 12 || !roll_number.startsWith('2411it')) {
                alert('Please enter a valid roll number in the format 2411it0100');
                images.style.display = 'none';
                return;
            }
            images.style.display = 'block';
            let num = roll_number.substring(10);
            // images.src = `${num}.png`;
            images.src= num+".png";
        }
        </script>
