<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    .a {
      position: fixed;
      display: flex;
      width: 300px;
      height: 380px;
      flex-direction: column;
      background-color: beige;
      border: 8px solid yellow;
      box-shadow: 2px 2px 5px 5px;
      padding: 15px;
    }

    body {
      display: flex;
      justify-content: center;
      margin-top: 250px;
      background-image: url('hii.jpg');
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    #but {
      margin-top: 20px;
      border-radius: 30px;
      border: 3px solid blue;
      cursor: pointer;
    }

    span {
      font-size: 12px;
      color: red;
      margin-bottom: 10px;
      display: none;
    }

    input {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <form onsubmit="return submitForm()" action="https://hussain786-11.github.io/class-photos/">
    <div class="a">
      <center><h1>Login</h1></center>

      <label for="name">Name:</label>
      <input type="text" placeholder="Enter your name" id="name"><br>

      <label for="email">Email:</label>
      <input type="email" placeholder="Enter your email" id="email" name="email" required><br>

      <label for="password">Password:</label>
      <input type="password" placeholder="Enter password" id="password">
      <span id="error-msg">Password must be 123456</span><br>

      <a href="signup.html">Sign up?</a>
      <button type="submit" id="but">Login</button>
    </div>
  </form>

  <script>
    function submitForm() {
      let pss = document.getElementById("password").value;
      let correct = "123456";
      let errorSpan = document.getElementById("error-msg");

      if (pss === correct) {
        errorSpan.style.display = "none";
        alert("Correct");
        return true;
      } else {
        errorSpan.style.display = "inline";
        alert("Please enter correct password");
        return false;
      }
    }
  </script>
</body>
</html>
